<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catalogo de cursos de NovaCore Technologies.">
    <meta name="keywords" content="cursos, programacion, academia, tecnologia">
    <meta name="author" content="NovaCore Technologies">
    <link rel="shortcut icon" href="./images/logotitle.png">
    <title>Cursos | NovaCore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">
    <link rel="stylesheet" href="./css/boostrap.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/cursos.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="./index.html">
                <img class="logo" src="./images/logotitle.png" alt="Logo Nova Core">
                <div class="logo-text">
                    <p class="logo-text-1">NovaCore</p>
                    <p class="logo-text-2">TECHNOLOGIES</p>
                </div>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                aria-expanded="false" aria-label="Abrir menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="./index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link activo" href="./cursos.html">Cursos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./profesores.html">Profesores</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./contacto.html">Contacto</a>
                    </li>
                </ul>
                <form id="formBuscarCursos" class="d-flex" role="search">
                    <input id="buscarCurso" class="form-control me-2" type="search" placeholder="Buscar curso"
                        aria-label="Buscar curso">
                    <button class="btn btn-outline-success" type="submit">Buscar</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <header class="mb-4">
            <h1>Cursos</h1>
            <p class="descripcion">
                Estos son los cursos disponibles en NovaCore Technologies para aprender sobre tecnologia y
                programacion.
            </p>
        </header>
        <section class="mb-4">
            <div class="row">
                <div class="col-12 col-md-6 mb-3">
                    <select id="filtroCategoria" class="form-select">
                        <option value="Todas">Todas las categorias</option>
                        <option value="Desarrollo Web">Desarrollo Web</option>
                        <option value="Programacion">Programacion</option>
                        <option value="Datos">Datos</option>
                        <option value="Seguridad">Seguridad</option>
                    </select>
                </div>
            </div>
            <p id="mensajeCursos" class="mensaje-cursos"></p>
        </section>
        <section>
            <h2>Catalogo de Cursos</h2>
            <div id="listaCursos" class="row"></div>
        </section>
        
    </main>
    <script src="./js/cursos.js"></script>
